		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
				background: #0a0f1e;
				color: #e2e8f0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
			}

			.card {
				background: #111827;
				border: 1px solid #1e293b;
				border-radius: 16px;
				padding: 52px 48px 44px;
				max-width: 500px;
				width: 100%;
				text-align: center;
				box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
			}

			.logo-row {
				display: flex;
				flex-direction: row;
				align-items: center;
				justify-content: space-between;
				margin-bottom: 40px;
			}

			.logo img {
				height: 40px;
				width: auto;
				filter: brightness(0) invert(1);
			}

			.badge {
				display: inline-flex;
				align-items: center;
				gap: 7px;
				background: rgba(234, 179, 8, 0.1);
				border: 1px solid rgba(234, 179, 8, 0.28);
				color: #fbbf24;
				font-size: 11px;
				font-weight: 700;
				letter-spacing: 0.6px;
				text-transform: uppercase;
				padding: 5px 12px;
				border-radius: 100px;
			}

			.dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: #fbbf24;
				flex-shrink: 0;
				animation: pulse 1.8s ease-in-out infinite;
			}

			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
					transform: scale(1);
				}
				50% {
					opacity: 0.35;
					transform: scale(0.8);
				}
			}

			.icon-wrap {
				display: flex;
				align-items: center;
				justify-content: center;
				width: 72px;
				height: 72px;
				border-radius: 50%;
				background: rgba(99, 102, 241, 0.12);
				border: 1px solid rgba(99, 102, 241, 0.2);
				margin: 0 auto 28px;
			}

			.icon-wrap svg {
				width: 34px;
				height: 34px;
			}

			h1 {
				font-size: 26px;
				font-weight: 700;
				color: #f1f5f9;
				line-height: 1.25;
				margin-bottom: 14px;
				letter-spacing: -0.4px;
			}

			p {
				font-size: 15px;
				color: #94a3b8;
				line-height: 1.7;
				margin-bottom: 36px;
				max-width: 360px;
				margin-left: auto;
				margin-right: auto;
			}

			.progress-bar {
				height: 3px;
				background: #1e293b;
				border-radius: 100px;
				overflow: hidden;
				margin-bottom: 36px;
			}

			.progress-fill {
				height: 100%;
				background: linear-gradient(90deg, #6366f1, #818cf8);
				border-radius: 100px;
				animation: progress 2.4s ease-in-out infinite alternate;
			}

			@keyframes progress {
				0% {
					width: 20%;
					margin-left: 0;
				}
				100% {
					width: 40%;
					margin-left: 60%;
				}
			}

			.divider {
				height: 1px;
				background: #1e293b;
				margin-bottom: 24px;
			}

			.footer {
				font-size: 13px;
				color: #475569;
			}

			.footer a {
				color: #6366f1;
				text-decoration: none;
			}

			.footer a:hover {
				text-decoration: underline;
			}

			@media (max-width: 480px) {
				.card {
					padding: 40px 28px 36px;
				}
				h1 {
					font-size: 22px;
				}
				.logo img {
					height: 32px;
				}
			}
		</style>
	</head>
