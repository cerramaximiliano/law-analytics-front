<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>UX Audit — Compare Before / After</title>
		<style>
			:root {
				--bg: #0e0f12;
				--panel: #15171c;
				--border: #272932;
				--text: #e6e7eb;
				--muted: #8b8f9b;
				--primary: #6366f1;
				--success: #10b981;
				--warn: #f59e0b;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
				background: var(--bg);
				color: var(--text);
				line-height: 1.5;
			}
			header {
				position: sticky;
				top: 0;
				background: var(--panel);
				border-bottom: 1px solid var(--border);
				padding: 14px 24px;
				display: flex;
				align-items: center;
				gap: 18px;
				flex-wrap: wrap;
				z-index: 10;
			}
			h1 {
				font-size: 17px;
				margin: 0;
				font-weight: 600;
			}
			.meta {
				color: var(--muted);
				font-size: 12px;
			}
			.controls {
				display: flex;
				gap: 6px;
				align-items: center;
			}
			.controls + .controls {
				margin-left: 8px;
				padding-left: 16px;
				border-left: 1px solid var(--border);
			}
			.spacer {
				flex: 1;
			}
			.tab {
				background: transparent;
				color: var(--muted);
				border: 1px solid var(--border);
				padding: 5px 12px;
				border-radius: 6px;
				cursor: pointer;
				font-size: 12px;
				font-weight: 500;
			}
			.tab:hover {
				color: var(--text);
			}
			.tab.active {
				background: var(--primary);
				color: white;
				border-color: var(--primary);
			}
			main {
				padding: 24px;
				max-width: 1800px;
				margin: 0 auto;
			}
			.route {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 20px;
				margin-bottom: 20px;
			}
			.route h2 {
				font-size: 16px;
				margin: 0 0 4px 0;
				font-weight: 600;
			}
			.route .path {
				color: var(--muted);
				font-size: 13px;
				margin: 0 0 16px 0;
				font-family: ui-monospace, monospace;
			}
			.pair {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 16px;
				align-items: flex-start;
			}
			.side {
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			.label {
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: var(--muted);
			}
			.label.before {
				color: var(--warn);
			}
			.label.after {
				color: var(--success);
			}
			.img-wrap {
				border: 1px solid var(--border);
				border-radius: 8px;
				background: #000;
				overflow: hidden;
				cursor: zoom-in;
				min-height: 200px;
			}
			.img-wrap img {
				display: block;
				width: 100%;
				height: auto;
			}
			.viewport-hidden {
				display: none !important;
			}
			footer {
				text-align: center;
				color: var(--muted);
				font-size: 12px;
				padding: 24px;
			}
			.lightbox {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.92);
				display: none;
				align-items: center;
				justify-content: center;
				z-index: 100;
				padding: 24px;
				cursor: zoom-out;
			}
			.lightbox.open {
				display: flex;
			}
			.lightbox img {
				max-width: 100%;
				max-height: 100%;
			}
			.badges {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
				margin-bottom: 10px;
			}
			.badge {
				font-size: 11px;
				padding: 2px 8px;
				border-radius: 4px;
				background: var(--border);
				color: var(--muted);
			}
			.badge.touched {
				background: rgba(16, 185, 129, 0.15);
				color: var(--success);
				border: 1px solid rgba(16, 185, 129, 0.3);
			}
			.badge.unchanged {
				opacity: 0.5;
			}
		</style>
	</head>
	<body>
		<header>
			<div>
				<h1>UX Audit — Compare Before / After</h1>
				<div class="meta">branch <code>ux/audit-2026-04-21</code></div>
			</div>
			<div class="spacer"></div>
			<div class="controls">
				<span class="meta">Viewport:</span>
				<button class="tab active" data-vp="desktop">Desktop</button>
				<button class="tab" data-vp="tablet">Tablet</button>
				<button class="tab" data-vp="mobile">Mobile</button>
			</div>
			<div class="controls">
				<span class="meta">Comparar contra:</span>
				<button class="tab" data-batch="after-batch1">Batch 1</button>
				<button class="tab" data-batch="after-batch2">Batch 2</button>
				<button class="tab" data-batch="after-batch3">Batch 3</button>
				<button class="tab active" data-batch="after-batch4">Batch 4 (final)</button>
			</div>
		</header>

		<main id="routes"></main>

		<footer>Click en cualquier imagen para ampliar · ESC para cerrar</footer>

		<div class="lightbox" id="lightbox"><img alt="" /></div>

		<script>
			const ROUTES = [
				{
					name: "dashboard",
					label: "Dashboard",
					path: "/dashboard/default",
					touchedBatches: { "after-batch1": true, "after-batch2": false, "after-batch3": true, "after-batch4": true },
				},
				{
					name: "calendar",
					label: "Calendario",
					path: "/apps/calendar",
					touchedBatches: { "after-batch1": false, "after-batch2": true, "after-batch3": true, "after-batch4": true },
				},
				{
					name: "folders",
					label: "Listado de Causas",
					path: "/apps/folders/list",
					touchedBatches: { "after-batch1": false, "after-batch2": true, "after-batch3": true, "after-batch4": true },
				},
				{
					name: "profile",
					label: "Perfil (datos personales)",
					path: "/apps/profiles/user/personal",
					touchedBatches: { "after-batch1": true, "after-batch2": true, "after-batch3": true, "after-batch4": true },
				},
				{
					name: "escritos",
					label: "Escritos",
					path: "/documentos/escritos",
					touchedBatches: { "after-batch1": false, "after-batch2": true, "after-batch3": true, "after-batch4": true },
				},
				{
					name: "contacts",
					label: "Contactos (template)",
					path: "/apps/customer/list",
					touchedBatches: { "after-batch1": false, "after-batch2": false, "after-batch3": false, "after-batch4": false },
				},
				{
					name: "tasks",
					label: "Tareas (template)",
					path: "/tasks",
					touchedBatches: { "after-batch1": false, "after-batch2": false, "after-batch3": false, "after-batch4": false },
				},
				{
					name: "invoices",
					label: "Facturación (template)",
					path: "/apps/invoice/dashboard",
					touchedBatches: { "after-batch1": false, "after-batch2": false, "after-batch3": false, "after-batch4": false },
				},
			];
			const VIEWPORTS = ["desktop", "tablet", "mobile"];
			const BATCH_LABELS = { "after-batch1": "Batch 1", "after-batch2": "Batch 2", "after-batch3": "Batch 3", "after-batch4": "Batch 4" };

			const routesEl = document.getElementById("routes");

			function render() {
				const vp = document.querySelector(".tab.active[data-vp]").dataset.vp;
				const batch = document.querySelector(".tab.active[data-batch]").dataset.batch;

				routesEl.innerHTML = ROUTES.map((r) => {
					const touched = r.touchedBatches[batch];
					const batchLabel = BATCH_LABELS[batch];
					return `
      <section class="route">
        <h2>${r.label}</h2>
        <p class="path">${r.path}</p>
        <div class="badges">
          <span class="badge ${r.touchedBatches["after-batch1"] ? "touched" : "unchanged"}">B1: ${r.touchedBatches["after-batch1"] ? "✓" : "—"}</span>
          <span class="badge ${r.touchedBatches["after-batch2"] ? "touched" : "unchanged"}">B2: ${r.touchedBatches["after-batch2"] ? "✓" : "—"}</span>
          <span class="badge ${r.touchedBatches["after-batch3"] ? "touched" : "unchanged"}">B3: ${r.touchedBatches["after-batch3"] ? "✓" : "—"}</span>
          <span class="badge ${r.touchedBatches["after-batch4"] ? "touched" : "unchanged"}">B4: ${r.touchedBatches["after-batch4"] ? "✓" : "—"}</span>
        </div>
        <div class="pair" data-vp="${vp}">
          <div class="side">
            <div class="label before">Antes (original) · ${vp}</div>
            <div class="img-wrap"><img loading="lazy" src="screenshots/${r.name}-${vp}.png" alt="${r.name} ${vp} before" /></div>
          </div>
          <div class="side">
            <div class="label after">Después · ${batchLabel} · ${vp}</div>
            <div class="img-wrap"><img loading="lazy" src="${batch}/screenshots/${r.name}-${vp}.png" alt="${r.name} ${vp} after ${batchLabel}" /></div>
          </div>
        </div>
      </section>
    `;
				}).join("");

				// rebind lightbox
				document.querySelectorAll(".img-wrap img").forEach((img) => {
					img.addEventListener("click", (e) => {
						lbImg.src = e.target.src;
						lb.classList.add("open");
					});
				});
			}

			document.querySelectorAll(".tab").forEach((btn) => {
				btn.addEventListener("click", () => {
					const group = btn.dataset.vp ? "[data-vp]" : "[data-batch]";
					document.querySelectorAll(`.tab${group}`).forEach((b) => b.classList.remove("active"));
					btn.classList.add("active");
					render();
				});
			});

			const lb = document.getElementById("lightbox");
			const lbImg = lb.querySelector("img");
			lb.addEventListener("click", () => lb.classList.remove("open"));
			document.addEventListener("keydown", (e) => {
				if (e.key === "Escape") lb.classList.remove("open");
			});

			render();
		</script>
	</body>
</html>
