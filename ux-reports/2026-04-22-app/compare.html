<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>UX Audit Pasada 2 — Compare Before / After</title>
		<style>
			:root {
				--bg: #0e0f12;
				--panel: #15171c;
				--border: #272932;
				--text: #e6e7eb;
				--muted: #8b8f9b;
				--primary: #6366f1;
				--success: #10b981;
				--warn: #f59e0b;
			}
			* { box-sizing: border-box; }
			body {
				margin: 0;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
				background: var(--bg);
				color: var(--text);
				line-height: 1.5;
			}
			header {
				position: sticky;
				top: 0;
				background: var(--panel);
				border-bottom: 1px solid var(--border);
				padding: 14px 24px;
				display: flex;
				align-items: center;
				gap: 18px;
				flex-wrap: wrap;
				z-index: 10;
			}
			h1 { font-size: 17px; margin: 0; font-weight: 600; }
			.meta { color: var(--muted); font-size: 12px; }
			.spacer { flex: 1; }
			.controls { display: flex; gap: 6px; align-items: center; }
			.tab {
				background: transparent;
				color: var(--muted);
				border: 1px solid var(--border);
				padding: 5px 12px;
				border-radius: 6px;
				cursor: pointer;
				font-size: 12px;
				font-weight: 500;
			}
			.tab:hover { color: var(--text); }
			.tab.active {
				background: var(--primary);
				color: white;
				border-color: var(--primary);
			}
			main { padding: 24px; max-width: 1800px; margin: 0 auto; }
			.route {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 10px;
				padding: 20px;
				margin-bottom: 20px;
			}
			.route h2 { font-size: 16px; margin: 0 0 4px 0; font-weight: 600; }
			.route .path { color: var(--muted); font-size: 13px; margin: 0 0 16px 0; font-family: ui-monospace, monospace; }
			.pair {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 16px;
				align-items: flex-start;
			}
			.side { display: flex; flex-direction: column; gap: 8px; }
			.label {
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: var(--muted);
			}
			.label.before { color: var(--warn); }
			.label.after { color: var(--success); }
			.img-wrap {
				border: 1px solid var(--border);
				border-radius: 8px;
				background: #000;
				overflow: hidden;
				cursor: zoom-in;
				min-height: 200px;
			}
			.img-wrap img { display: block; width: 100%; height: auto; }
			footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
			.lightbox {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.92);
				display: none;
				align-items: center;
				justify-content: center;
				z-index: 100;
				padding: 24px;
				cursor: zoom-out;
			}
			.lightbox.open { display: flex; }
			.lightbox img { max-width: 100%; max-height: 100%; }
			.group-label {
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: var(--muted);
				padding: 20px 0 8px 0;
				border-top: 1px solid var(--border);
				margin-top: 16px;
			}
			.group-label:first-child { border-top: 0; margin-top: 0; padding-top: 0; }
			.note {
				color: var(--muted);
				font-size: 12px;
				margin: 4px 0 12px 0;
				font-style: italic;
			}
		</style>
	</head>
	<body>
		<header>
			<div>
				<h1>UX Audit Pasada 2 — Compare Before / After</h1>
				<div class="meta">branch <code>ux/audit-app-2026-04-22</code> · 26 rutas app auth (batches A+B+C)</div>
			</div>
			<div class="spacer"></div>
			<div class="controls">
				<span class="meta">Viewport:</span>
				<button class="tab active" data-vp="desktop">Desktop</button>
				<button class="tab" data-vp="tablet">Tablet</button>
				<button class="tab" data-vp="mobile">Mobile</button>
			</div>
		</header>

		<main id="routes"></main>

		<footer>Click en cualquier imagen para ampliar · ESC para cerrar</footer>

		<div class="lightbox" id="lightbox"><img alt="" /></div>

		<script>
			const GROUPS = [
				{
					label: "Dashboard + Chat + Docs",
					routes: [
						{ name: "dashboard-analytics", label: "Dashboard Analytics", path: "/dashboard/analytics" },
						{ name: "chat", label: "Chat", path: "/apps/chat" },
						{ name: "documents", label: "Documentos", path: "/apps/documents" },
						{ name: "ayuda", label: "Ayuda", path: "/ayuda" },
					],
				},
				{
					label: "Calculadoras",
					routes: [
						{ name: "calc-all", label: "Calc · índice", path: "/apps/calc" },
						{ name: "calc-labor", label: "Calc laboral", path: "/apps/calc/labor" },
						{ name: "calc-civil", label: "Calc civil", path: "/apps/calc/civil" },
						{ name: "calc-intereses", label: "Calc intereses", path: "/apps/calc/intereses" },
					],
				},
				{
					label: "Calendar + Subscription states",
					routes: [
						{ name: "calendar-availability", label: "Disponibilidad", path: "/apps/calendar/availability" },
						{ name: "calendar-reservations", label: "Reservas", path: "/apps/calendar/reservations" },
						{ name: "calendar-booking-config", label: "Config de booking", path: "/apps/calendar/booking-config" },
						{ name: "subscription-success", label: "Suscripción · éxito", path: "/apps/subscription/success" },
						{ name: "subscription-error", label: "Suscripción · error", path: "/apps/subscription/error" },
					],
				},
				{
					label: "Profile tabs (user)",
					routes: [
						{ name: "profile-user-payment", label: "Perfil · Pagos", path: "/apps/profiles/user/payment" },
						{ name: "profile-user-password", label: "Perfil · Contraseña", path: "/apps/profiles/user/password" },
						{ name: "profile-user-professional", label: "Perfil · Profesional", path: "/apps/profiles/user/professional" },
						{ name: "profile-user-settings", label: "Perfil · Ajustes", path: "/apps/profiles/user/settings" },
					],
				},
				{
					label: "Profile tabs (account)",
					routes: [
						{ name: "profile-account-my-account", label: "Cuenta · Mi cuenta", path: "/apps/profiles/account/my-account" },
						{ name: "profile-account-password", label: "Cuenta · Contraseña (eliminada)", path: "/apps/profiles/account/password" },
						{ name: "profile-account-role", label: "Cuenta · Mi Equipo", path: "/apps/profiles/account/role" },
						{ name: "profile-account-settings", label: "Cuenta · Suscripción", path: "/apps/profiles/account/settings" },
						{ name: "profile-account-pjn", label: "Cuenta · Integración PJN", path: "/apps/profiles/account/pjn" },
					],
				},
				{
					label: "Tools + Modelos + Suscripciones",
					routes: [
						{ name: "herramientas-postal", label: "Seguimiento postal", path: "/herramientas/seguimiento-postal" },
						{ name: "herramientas-plantillas", label: "Plantillas (legacy → redirect)", path: "/herramientas/plantillas" },
						{ name: "documentos-modelos", label: "Modelos", path: "/documentos/modelos" },
						{ name: "suscripciones-tables", label: "Suscripciones · Planes", path: "/suscripciones/tables" },
					],
				},
			];

			const routesEl = document.getElementById("routes");

			function render() {
				const vp = document.querySelector(".tab.active[data-vp]").dataset.vp;
				routesEl.innerHTML = GROUPS.map((group) => {
					const groupContent = group.routes
						.map((r) => `
          <section class="route">
            <h2>${r.label}</h2>
            <p class="path">${r.path}</p>
            <div class="pair">
              <div class="side">
                <div class="label before">Antes · ${vp}</div>
                <div class="img-wrap"><img loading="lazy" src="screenshots/${r.name}-${vp}.png" alt="${r.name} ${vp} before" /></div>
              </div>
              <div class="side">
                <div class="label after">Después · ${vp}</div>
                <div class="img-wrap"><img loading="lazy" src="after-batch-abc/screenshots/${r.name}-${vp}.png" alt="${r.name} ${vp} after" /></div>
              </div>
            </div>
          </section>
        `)
						.join("");
					return `<div class="group-label">${group.label}</div>${groupContent}`;
				}).join("");

				document.querySelectorAll(".img-wrap img").forEach((img) => {
					img.addEventListener("click", (e) => {
						lbImg.src = e.target.src;
						lb.classList.add("open");
					});
				});
			}

			document.querySelectorAll(".tab[data-vp]").forEach((btn) => {
				btn.addEventListener("click", () => {
					document.querySelectorAll(".tab[data-vp]").forEach((b) => b.classList.remove("active"));
					btn.classList.add("active");
					render();
				});
			});

			const lb = document.getElementById("lightbox");
			const lbImg = lb.querySelector("img");
			lb.addEventListener("click", () => lb.classList.remove("open"));
			document.addEventListener("keydown", (e) => {
				if (e.key === "Escape") lb.classList.remove("open");
			});

			render();
		</script>
	</body>
</html>
